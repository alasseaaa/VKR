{% load static %}
<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Генетический интерпретатор</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
      :root {
        --app-bg: #f8f9fa;
      }
      body {
        background: var(--app-bg);
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        font-size: 0.925rem;
      }
      .sidebar {
        min-height: 100vh;
        background: #ffffff;
        border-right: 1px solid rgba(0,0,0,0.06);
      }
      .app-main {
        padding: 1.25rem 1rem;
      }
      .nav-link[data-active="true"] {
        background: rgba(13,110,253,0.10);
        color: #0d6efd;
        border-radius: 0.375rem;
        font-weight: 500;
      }
      .badge-status {
        min-width: 86px;
        text-align: center;
      }
      .app-page {
        max-width: 1100px;
      }
      .app-page-title {
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .app-card {
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.06);
        box-shadow: 0 3px 12px rgba(0,0,0,0.06);
      }
      .app-card .card-header {
        border-radius: 12px 12px 0 0;
      }
    </style>
  </head>
  <body>
    <div id="app-shell" class="container-fluid g-0">
      <div class="row g-0">
        <aside class="col-md-3 col-lg-2 sidebar px-3 pt-3">
          <div class="d-flex align-items-center mb-3">
            <div class="me-2">
              <i class="bi bi-braces-asterisk fs-4 text-primary"></i>
            </div>
            <div>
              <div class="fw-semibold">Генетический</div>
              <div class="text-muted small">интерпретатор</div>
            </div>
          </div>

          <div id="sidebar"></div>

          <hr class="my-3" />
          <div class="pb-2">
            <div class="text-muted small">Аккаунт</div>
            <div id="account-block" class="small"></div>
            <button id="btn-logout" class="btn btn-outline-danger btn-sm w-100 mt-2 d-none">
              Выйти
            </button>
          </div>
        </aside>

        <main class="col-md-9 col-lg-10 app-main">
          <div id="alert-area"></div>
          <div id="page"></div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {# В DEBUG query сбрасывает кэш модулей при перезагрузке; в prod меняйте v= после правок JS #}
    <script type="module" src="{% static 'genapp/app/main.js' %}?{% if debug %}v={% now 'U' %}{% else %}v=6{% endif %}"></script>
  </body>
</html>
